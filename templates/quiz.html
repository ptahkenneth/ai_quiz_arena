<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Quiz Arena</title>
</head>
<body>
    <h1>AI Quiz Arena</h1>

    {% for q in questions %}
        <div class="question-block">
            <p><strong>{{ q['question'] }}</strong></p>
            <ul>
                {% for option in q['options'] %}
                    <li>{{ option }}</li>
                {% endfor %}
            </ul>
        </div>
    {% endfor %}

    <button>End Game</button>
</body>
</html>
